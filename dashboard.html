<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Price Battle · Analytics Dashboard</title>
<link rel="icon" type="image/png" href="favicon-dashboard.png">
<link rel="shortcut icon" href="favicon-dashboard.png">
<link rel="apple-touch-icon" href="favicon-dashboard.png">

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(160deg,#1a3a8f 0%,#1a56db 55%,#3b7fe4 100%);background-attachment:fixed;color:#1a1d1b;min-height:100vh;padding:20px 16px;}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;flex-wrap:wrap;}
.header-left{display:flex;align-items:center;gap:12px;}
.logo-circle{width:40px;height:40px;border-radius:50%;background:#fff;color:#1a56db;font-size:18px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.header-title{font-size:30px;font-weight:700;color:#fff;line-height:1;}
.status-wrap{display:flex;align-items:center;gap:7px;font-size:12px;color:#dbeafe;background:rgba(255,255,255,0.18);border-radius:20px;padding:5px 12px;}
.dot{width:7px;height:7px;border-radius:50%;background:#6ee7a8;animation:pulse 2s infinite;flex-shrink:0;}
.dot.err{background:#f87171;animation:none;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

/* CONTAINER */
.container{background:#f7f7f5;border-radius:20px;padding:24px 22px;max-width:1100px;margin:0 auto;}

/* FILTER BAR */
.filter-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:20px;}
.filter-group{display:flex;align-items:center;gap:6px;}
.filter-label{font-size:11px;color:#9a9d99;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;}

/* Period pills */
.period-btn{padding:5px 14px;border-radius:18px;border:1.5px solid #d0d2ce;background:#fff;color:#5a5d59;font-size:12px;font-weight:600;cursor:pointer;transition:all .12s;white-space:nowrap;font-family:inherit;}
.period-btn:hover{border-color:#1a56db;color:#1a56db;}
.period-btn.active{background:#1a56db;border-color:#1a56db;color:#fff;}

/* Date range picker */
.date-range{display:none;align-items:center;gap:6px;flex-wrap:wrap;}
.date-range.show{display:flex;}
input[type="date"]{background:#fff;border:1.5px solid #d0d2ce;color:#1a1d1b;border-radius:8px;padding:5px 10px;font-size:13px;cursor:pointer;outline:none;font-family:inherit;}
input[type="date"]:focus{border-color:#1a56db;}
.apply-btn{padding:5px 14px;border-radius:18px;background:#1a56db;border:none;color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;}
.apply-btn:hover{background:#1447c0;}

/* Site pills */
.site-pill{padding:5px 14px;border-radius:18px;border:1.5px solid #d0d2ce;background:#fff;color:#5a5d59;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .12s;white-space:nowrap;}
.site-pill:hover{border-color:#1a56db;color:#1a56db;}
.site-pill.active{background:#1a56db;border-color:#1a56db;color:#fff;}

/* Divider */
.filter-divider{width:1px;height:20px;background:#d0d2ce;flex-shrink:0;}

/* TOP STATS GRID */
.grid-top{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:18px;}

/* Regular stat cards */
.card{background:#fff;border-radius:18px;padding:22px;}
.card-label{font-size:11px;color:#9a9d99;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
.card-value{font-size:44px;font-weight:700;color:#1a1d1b;line-height:1;}
.card-sub{font-size:11px;color:#9a9d99;margin-top:6px;}

/* Active Now special card */
.card-active-now{background:linear-gradient(150deg,#2f6fe4,#0d3390);border-radius:18px;padding:22px;}
.card-active-now .card-label{color:#9dc4f8;font-size:11px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
.card-active-now .card-value{font-size:44px;font-weight:700;color:#dbe9ff;line-height:1;}
.card-active-now .card-sub{font-size:11px;color:#9dc4f8;margin-top:6px;}

/* Clickable stat cards */
.card.clickable{cursor:pointer;transition:box-shadow .15s,transform .15s;}
.card.clickable:hover{box-shadow:0 4px 20px rgba(26,86,219,0.16);transform:translateY(-2px);}
.card.clickable:active{transform:translateY(0);}
.trend-hint{font-size:10px;color:#1a56db;margin-top:5px;display:none;font-weight:600;}
.card.clickable .trend-hint{display:block;}

/* CHART OVERLAY */
.chart-overlay{position:fixed;inset:0;background:rgba(10,18,55,0.52);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .18s;}
.chart-overlay.open{opacity:1;pointer-events:all;}
.chart-modal{background:#fff;border-radius:20px;padding:24px;width:100%;max-width:600px;max-height:88vh;overflow-y:auto;transform:translateY(14px);transition:transform .18s;}
.chart-overlay.open .chart-modal{transform:translateY(0);}
.chart-modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;}
.chart-modal-title{font-size:15px;font-weight:700;color:#1a1d1b;}
.chart-modal-sub{font-size:11px;color:#9a9d99;margin-bottom:18px;}
.chart-close{background:none;border:none;font-size:20px;color:#c8cbc5;cursor:pointer;padding:2px 8px;border-radius:8px;line-height:1;font-family:inherit;}
.chart-close:hover{background:#f0f0ee;color:#1a1d1b;}
.chart-empty{color:#b8bbb6;font-size:13px;padding:36px 0;text-align:center;}
.chart-loading{color:#9a9d99;font-size:13px;padding:36px 0;text-align:center;}

/* BOTTOM GRID */
.section-title{font-size:14px;font-weight:700;color:#1a1d1b;margin-bottom:12px;}
.grid-bottom{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-bottom:16px;}

/* Rank list */
.rank-list{list-style:none;}
.rank-item{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid #f0f0ee;}
.rank-item:last-child{border-bottom:none;}
.rank-num{font-size:11px;color:#b8bbb6;min-width:16px;text-align:right;}
.rank-bar-wrap{flex:1;display:flex;flex-direction:column;gap:4px;min-width:0;}
.rank-name{font-size:13px;color:#1a1d1b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rank-bar-bg{height:7px;border-radius:4px;background:repeating-linear-gradient(-45deg,#eceeea 0 3px,#f7f7f5 3px 6px);overflow:hidden;}
.rank-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#6da2f0,#1a56db);transition:width .5s ease;}
.rank-count{font-size:12px;font-weight:700;color:#1a56db;min-width:28px;text-align:right;}
.no-data{color:#b8bbb6;font-size:13px;padding:8px 0;}

/* Badges */
.badge{display:inline-block;font-size:10px;padding:1px 7px;border-radius:8px;font-weight:600;margin-left:5px;vertical-align:middle;background:#e3ecfc;color:#1a56db;}

.last-refresh{font-size:11px;color:#9a9d99;text-align:center;padding:4px 0 0;}
.err-banner{background:#fdf0ef;border:1px solid #f3c8c4;border-radius:10px;padding:10px 14px;color:#b3372c;font-size:12px;margin-bottom:14px;display:none;}
.skeleton{background:linear-gradient(90deg,#eeeeed 25%,#e4e5e2 50%,#eeeeed 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px;}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

@media(max-width:600px){.card-value{font-size:32px;}.card-active-now .card-value{font-size:32px;}.filter-bar{gap:8px;}.header-title{font-size:22px;}}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo-circle">P</div>
    <div class="header-title">Dashboard</div>
  </div>
  <div class="status-wrap"><div class="dot" id="dot"></div><span id="status-txt">Connecting…</span></div>
</div>

<div class="container">
  <div class="filter-bar">
    <!-- Period presets -->
    <div class="filter-group">
      <span class="filter-label">Period</span>
      <button class="period-btn active" data-preset="today">Today</button>
      <button class="period-btn" data-preset="yesterday">Yesterday</button>
      <button class="period-btn" data-preset="7">7 Days</button>
      <button class="period-btn" data-preset="30">30 Days</button>
      <button class="period-btn" data-preset="custom">Custom 📅</button>
    </div>

    <!-- Custom date range (shown when Custom clicked) -->
    <div class="date-range" id="date-range">
      <span class="filter-label">From</span>
      <input type="date" id="dt-from">
      <span class="filter-label">To</span>
      <input type="date" id="dt-to">
      <button class="apply-btn" id="apply-range">Apply</button>
    </div>

    <div class="filter-divider"></div>

    <!-- Site filter pills -->
    <div class="filter-group">
      <span class="filter-label">Site</span>
      <button class="site-pill active" id="spill-all" onclick="setSite('')">All</button>
      <button class="site-pill" id="spill-iconsiam" onclick="setSite('iconsiam')">ICON</button>
      <button class="site-pill" id="spill-centralworld" onclick="setSite('centralworld')">CTW</button>
    </div>
  </div>

  <div class="err-banner" id="err-banner"></div>

  <div class="grid-top">
    <div class="card-active-now">
      <div class="card-label">Active Now</div>
      <div class="card-value" id="val-active"><div class="skeleton" style="width:50px;height:44px;"></div></div>
      <div class="card-sub">Sessions · last 2 min</div>
    </div>
    <div class="card" id="card-opens">
      <div class="card-label">Total Opens</div>
      <div class="card-value" id="val-opens"><div class="skeleton" style="width:70px;height:44px;"></div></div>
      <div class="card-sub">Page loads</div>
      <div class="trend-hint">📈 Tap to view trend</div>
    </div>
    <div class="card" id="card-trade">
      <div class="card-label">Trade-In Toggles</div>
      <div class="card-value" id="val-trade"><div class="skeleton" style="width:50px;height:44px;"></div></div>
      <div class="card-sub">Toggle on/off events</div>
      <div class="trend-hint">📈 Tap to view trend</div>
    </div>
    <div class="card" id="card-bundle">
      <div class="card-label">Bundle Adds</div>
      <div class="card-value" id="val-bundle"><div class="skeleton" style="width:50px;height:44px;"></div></div>
      <div class="card-sub">Add to Bundle Cart</div>
      <div class="trend-hint">📈 Tap to view trend</div>
    </div>
  </div>

  <div class="grid-bottom">
    <div class="card">
      <div class="section-title">Top 5 Regions</div>
      <ul class="rank-list" id="list-zones"><li class="rank-item"><div class="skeleton" style="width:100%;height:14px;"></div></li></ul>
    </div>
    <div class="card">
      <div class="section-title">Top 10 Countries</div>
      <ul class="rank-list" id="list-countries"><li class="rank-item"><div class="skeleton" style="width:100%;height:14px;"></div></li></ul>
    </div>
    <div class="card">
      <div class="section-title">Top 10 Products</div>
      <ul class="rank-list" id="list-products"><li class="rank-item"><div class="skeleton" style="width:100%;height:14px;"></div></li></ul>
    </div>
  </div>

  <div class="last-refresh" id="last-refresh">–</div>
</div>

<!-- Chart trend modal -->
<div class="chart-overlay" id="chart-overlay">
  <div class="chart-modal" id="chart-modal">
    <div class="chart-modal-header">
      <span class="chart-modal-title" id="chart-title">Trend</span>
      <button class="chart-close" onclick="closeChart()">✕</button>
    </div>
    <div class="chart-modal-sub" id="chart-sub"></div>
    <div id="chart-svg-wrap"><div class="chart-loading">Loading…</div></div>
  </div>
</div>

<script>
var SB_URL="https://pclutmwvjdkcctlsrhuc.supabase.co";
var SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBjbHV0bXd2amRrY2N0bHNyaHVjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNzI5MDQsImV4cCI6MjA5Njg0ODkwNH0.viLDekuYjYB_xAvlZlbQ-5GXY9cFRU3rMtmWywOLRIU";

// State
var STATE={
  preset:"today",
  fromTs:null,
  untilTs:null,
  site:""
};

function G(id){return document.getElementById(id);}
function fmtNum(n){return Number(n).toLocaleString("en");}

// ── Date helpers ──────────────────────────────────────────────────────────────
function todayStart(){var d=new Date();d.setHours(0,0,0,0);return d;}
function isoDate(d){return d.toISOString().slice(0,10);}

function buildTimestamps(){
  if(STATE.preset==="today"){
    STATE.fromTs=todayStart().toISOString();
    STATE.untilTs=null;
  } else if(STATE.preset==="yesterday"){
    var yd=todayStart();yd.setDate(yd.getDate()-1);
    STATE.fromTs=yd.toISOString();
    STATE.untilTs=todayStart().toISOString();
  } else if(STATE.preset==="7"){
    STATE.fromTs=new Date(Date.now()-7*864e5).toISOString();
    STATE.untilTs=null;
  } else if(STATE.preset==="30"){
    STATE.fromTs=new Date(Date.now()-30*864e5).toISOString();
    STATE.untilTs=null;
  }
  // "custom" already set by applyRange()
}

function applyRange(){
  var f=G("dt-from").value,t=G("dt-to").value;
  if(!f)return;
  STATE.fromTs=new Date(f+"T00:00:00").toISOString();
  STATE.untilTs=t?new Date(t+"T23:59:59").toISOString():null;
  load();
}

// ── Render helpers ────────────────────────────────────────────────────────────
function renderStat(id,val){G(id).textContent=fmtNum(val);}

function renderRankList(listId,items,nameFn,maxCnt){
  var ul=G(listId);
  if(!items||!items.length){
    ul.innerHTML="<li class='no-data'>No data yet</li>";return;
  }
  ul.innerHTML=items.map(function(item,i){
    var pct=maxCnt?Math.round((item.cnt/maxCnt)*100):0;
    return"<li class='rank-item'>"+
      "<span class='rank-num'>"+(i+1)+"</span>"+
      "<div class='rank-bar-wrap'>"+
        "<span class='rank-name'>"+nameFn(item)+"</span>"+
        "<div class='rank-bar-bg'><div class='rank-bar-fill' style='width:"+pct+"%'></div></div>"+
      "</div>"+
      "<span class='rank-count'>"+fmtNum(item.cnt)+"</span>"+
    "</li>";
  }).join("");
}

function catBadge(cat){
  if(!cat)return"";
  return"<span class='badge'>"+cat+"</span>";
}

function setStatus(live,msg){
  G("dot").className="dot"+(live?"":" err");
  G("status-txt").textContent=msg;
}

// ── Chart helpers ─────────────────────────────────────────────────────────────
function isMultiDay(){
  return STATE.preset==="7"||STATE.preset==="30"||STATE.preset==="custom";
}

function updateCardClickability(){
  var can=isMultiDay();
  ["card-opens","card-trade","card-bundle"].forEach(function(id){
    var el=G(id);
    if(!el)return;
    if(can)el.classList.add("clickable");
    else el.classList.remove("clickable");
  });
}

function rangeLabel(){
  if(STATE.preset==="7")return"Last 7 days";
  if(STATE.preset==="30")return"Last 30 days";
  if(STATE.preset==="custom"){
    var f=G("dt-from").value,t=G("dt-to").value;
    return f+(t?" → "+t:"");
  }
  return"";
}

function renderLineChart(wrap,data,metric){
  if(!data||!data.length){wrap.innerHTML='<div class="chart-empty">No data for this period</div>';return;}
  var W=520,H=240,padL=50,padR=16,padT=28,padB=42;
  var cW=W-padL-padR,cH=H-padT-padB;
  var vals=data.map(function(d){return+(d[metric]||0);});
  var maxV=Math.max.apply(null,vals)||1;
  var n=data.length;
  function xOf(i){return padL+(n<2?cW/2:i*cW/(n-1));}
  function yOf(v){return padT+cH-(v/maxV)*cH;}
  function fmtDay(s){if(!s)return"";return s.slice(8)+"-"+s.slice(5,7);}
  var svg='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;display:block;">';
  // Grid + Y labels
  [0,0.25,0.5,0.75,1].forEach(function(frac){
    var gv=Math.round(maxV*frac);
    var gy=yOf(gv);
    svg+='<line x1="'+padL+'" y1="'+gy.toFixed(1)+'" x2="'+(W-padR)+'" y2="'+gy.toFixed(1)+'" stroke="#eeede9" stroke-width="1"/>';
    svg+='<text x="'+(padL-6)+'" y="'+(gy+4).toFixed(1)+'" text-anchor="end" font-size="10" fill="#b8bbb6">'+fmtNum(gv)+'</text>';
  });
  // Area fill
  var pts=data.map(function(d,i){return xOf(i).toFixed(1)+","+yOf(+(d[metric]||0)).toFixed(1);}).join(" ");
  var areaCoords=xOf(0).toFixed(1)+","+(padT+cH)+" "+pts+" "+xOf(n-1).toFixed(1)+","+(padT+cH);
  svg+='<polygon points="'+areaCoords+'" fill="#1a56db" opacity="0.07"/>';
  // Line
  svg+='<polyline points="'+pts+'" fill="none" stroke="#1a56db" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>';
  // Dots + value labels
  data.forEach(function(d,i){
    var x=xOf(i),y=yOf(+(d[metric]||0));
    var val=+(d[metric]||0);
    var labelY=y<padT+16?y+16:y-8;
    svg+='<circle cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="4.5" fill="#1a56db" stroke="#fff" stroke-width="2"><title>'+d.day+': '+fmtNum(val)+'</title></circle>';
    svg+='<text x="'+x.toFixed(1)+'" y="'+labelY.toFixed(1)+'" text-anchor="middle" font-size="10" font-weight="600" fill="#1a56db">'+fmtNum(val)+'</text>';
  });
  // X labels — max 8 evenly spaced, format DD-MM
  var step=Math.max(1,Math.ceil(n/8));
  data.forEach(function(d,i){
    if(i%step!==0&&i!==n-1)return;
    svg+='<text x="'+xOf(i).toFixed(1)+'" y="'+(H-8)+'" text-anchor="middle" font-size="10" fill="#b8bbb6">'+fmtDay(d.day)+'</text>';
  });
  svg+='</svg>';
  wrap.innerHTML=svg;
}

function openChart(metric,title){
  if(!isMultiDay())return;
  G("chart-title").textContent=title;
  G("chart-sub").textContent=rangeLabel();
  G("chart-svg-wrap").innerHTML='<div class="chart-loading">Loading…</div>';
  G("chart-overlay").classList.add("open");

  buildTimestamps();
  var body={since_ts:STATE.fromTs};
  if(STATE.untilTs)body.until_ts=STATE.untilTs;
  if(STATE.site)body.p_site_id=STATE.site;

  fetch(SB_URL+"/rest/v1/rpc/get_dashboard_daily",{
    method:"POST",
    headers:{"Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY},
    body:JSON.stringify(body)
  })
  .then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
  .then(function(data){renderLineChart(G("chart-svg-wrap"),data,metric);})
  .catch(function(e){
    G("chart-svg-wrap").innerHTML='<div class="chart-empty">Could not load trend data<br><small>'+e.message+'</small></div>';
  });
}

function closeChart(){
  G("chart-overlay").classList.remove("open");
}

// ── Load ──────────────────────────────────────────────────────────────────────
function load(){
  setStatus(true,"Loading…");
  buildTimestamps();

  var body={since_ts:STATE.fromTs};
  if(STATE.untilTs)body.until_ts=STATE.untilTs;
  if(STATE.site)body.p_site_id=STATE.site;

  fetch(SB_URL+"/rest/v1/rpc/get_dashboard",{
    method:"POST",
    headers:{"Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY},
    body:JSON.stringify(body)
  })
  .then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
  .then(function(d){
    G("err-banner").style.display="none";
    renderStat("val-active",d.active_now||0);
    renderStat("val-opens",d.total_opens||0);
    renderStat("val-trade",d.trade_toggles||0);
    renderStat("val-bundle",d.bundle_adds||0);

    var zones=d.top_zones||[],countries=d.top_countries||[],products=d.top_products||[];
    renderRankList("list-zones",zones,function(z){return z.zone;},zones[0]?zones[0].cnt:1);
    renderRankList("list-countries",countries,function(c){return c.country_name||c.country_code||"?";},countries[0]?countries[0].cnt:1);
    renderRankList("list-products",products,function(p){return(p.product_name||"?")+catBadge(p.category);},products[0]?products[0].cnt:1);

    var now=new Date();
    G("last-refresh").textContent="Updated "+now.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",second:"2-digit"})+" · auto-refresh 30s";
    setStatus(true,"Live");
  })
  .catch(function(e){
    G("err-banner").textContent="Error: "+e.message+" — Check Supabase migration v2 was run.";
    G("err-banner").style.display="block";
    setStatus(false,"Error");
  });
}

// ── Period buttons ────────────────────────────────────────────────────────────
document.querySelectorAll(".period-btn").forEach(function(btn){
  btn.addEventListener("click",function(){
    document.querySelectorAll(".period-btn").forEach(function(b){b.classList.remove("active");});
    btn.classList.add("active");
    var preset=btn.dataset.preset;
    STATE.preset=preset;
    updateCardClickability();
    var range=G("date-range");
    if(preset==="custom"){
      range.classList.add("show");
      if(!G("dt-from").value){
        var td=isoDate(new Date());
        G("dt-from").value=td;G("dt-to").value=td;
      }
    } else {
      range.classList.remove("show");
      load();
    }
  });
});

G("apply-range").addEventListener("click",applyRange);

// ── Card click → trend chart ──────────────────────────────────────────────────
G("card-opens").addEventListener("click",function(){openChart("total_opens","Total Opens");});
G("card-trade").addEventListener("click",function(){openChart("trade_toggles","Trade-In Toggles");});
G("card-bundle").addEventListener("click",function(){openChart("bundle_adds","Bundle Adds");});

// Close on backdrop click or Escape
G("chart-overlay").addEventListener("click",function(e){if(e.target===this)closeChart();});
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeChart();});

function setSite(site){
  STATE.site=site;
  ["","iconsiam","centralworld"].forEach(function(s){
    var id="spill-"+(s||"all");
    var el=document.getElementById(id);
    if(el)el.classList[s===site?"add":"remove"]("active");
  });
  load();
}

// ── Init ──────────────────────────────────────────────────────────────────────
load();
updateCardClickability();
setInterval(load,30000);
